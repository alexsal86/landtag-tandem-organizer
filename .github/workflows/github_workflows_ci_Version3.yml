name: CI

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      run_e2e_smoke:
        description: "Optionalen E2E-Smoke-Job ausführen"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  issues: write

jobs:
  parser-and-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Parser (validation only)
        run: |
          if [ -f scripts/urls.txt ]; then
            python scripts/parse_landtag_pdf.py --list-file scripts/urls.txt --schema-validate --log-level INFO
          else
            python scripts/parse_landtag_pdf.py --schema-validate --log-level INFO
          fi

      - name: Run Pytests
        run: pytest -q

  dependency-scan:
    runs-on: ubuntu-latest
    needs: parser-and-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Dependency scan (high+ vulnerabilities)
        run: npm audit --audit-level=high

  secret-scan:
    runs-on: ubuntu-latest
    needs: parser-and-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan (PR gate)
        if: github.event_name == 'pull_request'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: detect --verbose --redact --config .gitleaks.toml --source .

      - name: Skip secret scan outside pull requests
        if: github.event_name != 'pull_request'
        run: echo "Secret-Scanning ist als PR-Gate konfiguriert und wird hier übersprungen."

  static-security-analysis:
    runs-on: ubuntu-latest
    needs: parser-and-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Semgrep scan (src + supabase functions)
        run: semgrep scan --config p/security-audit --error --severity ERROR --exclude-from .semgrepignore src/ supabase/functions/

  node-quality-gates:
    runs-on: ubuntu-latest
    needs:
      - parser-and-tests
      - dependency-scan
      - secret-scan
      - static-security-analysis
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Mandatory security hygiene checks
        run: npm run check:security-hygiene

      - name: "Any-Delta PR-Gate (blockiert positive Deltas)"
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"

          BASE_TOTAL=$(npm run --silent report:any-usage:total -- --ref="origin/${{ github.base_ref }}")
          HEAD_TOTAL=$(npm run --silent report:any-usage:total)
          DELTA=$((HEAD_TOTAL - BASE_TOTAL))

          {
            echo "### Any-Delta pro PR"
            echo "- Base (origin/${{ github.base_ref }}): ${BASE_TOTAL}"
            echo "- Head (aktueller PR): ${HEAD_TOTAL}"
            echo "- Delta: ${DELTA}"
            echo ""
            echo "### Any-Cluster (Head)"
            npm run --silent report:any-usage:clusters | sed '1d'
            echo ""
            echo "### Any-Dateien (Head, Top 15)"
            npm run --silent report:any-usage:files | sed '1d'
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$DELTA" -gt 0 ]; then
            echo "Fehler: Der Any-Zähler ist um ${DELTA} gestiegen."
            echo "Positive Any-Deltas sind nicht erlaubt."
            exit 1
          fi

      - name: "Type-Safety Delta PR-Gate (Any + TS-Kommentare)"
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          npm run check:type-safety-delta -- --base="origin/${{ github.base_ref }}"

      - name: Mandatory Supabase edge-function security checks
        run: npm run check:edge-function-security

      - name: Mandatory diagram drift check
        run: npm run check:diagram-drift

      - name: Type Check (falls TS)
        run: |
          if [ -f tsconfig.json ]; then
            npx tsc --noEmit
          else
            echo "Kein tsconfig.json – überspringe Type Check."
          fi

      - name: Lint Knowledge-Bereich (blockierend)
        run: npm run lint:knowledge

      - name: Strict Type Check Knowledge-Bereich
        run: npm run typecheck:knowledge

      - name: "Strict Type Check Migration-Batches (Stufe 1: strictNullChecks)"
        run: |
          npm run typecheck:hooks-batch1
          npm run typecheck:pages-batch1
          npm run typecheck:services-batch1

      - name: "Hinweis auf fehlende Batch-Dokumentation"
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          CHANGED_FILES=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")
          echo "Geänderte Dateien:"
          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | rg -q '(^package\.json$|^tsconfig\..*-strict\.json$|^src/(hooks|contexts|providers|services|features|components|pages)/)'; then
            if ! echo "$CHANGED_FILES" | rg -q '(^docs/strict-progress\.md$|^docs/.+batch.+\.md$)'; then
              {
                echo "### Hinweis: Strict-Migrationsdokumentation prüfen"
                echo "Dieser PR ändert Strict-Batches oder betroffene Scopes, aber kein Batch-Dokument."
                echo "Bitte prüfen, ob \\`docs/strict-progress.md\\` oder ein zugehöriges Batch-Dokument aktualisiert werden muss."
              } >> "$GITHUB_STEP_SUMMARY"
              echo "Warnung: Bitte Strict-Migrationsdokumentation prüfen."
            fi
          fi
      - name: Build (falls vorhanden)
        run: |
          if npm run | grep -q "build"; then
            npm run build
          else
            echo "Kein build Script vorhanden – überspringe."
          fi

      - name: Bundle-Size Report erzeugen
        run: |
          if [ -d dist/assets ]; then
            npm run report:bundle-size | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "dist/assets nicht gefunden – Bundle-Report übersprungen." | tee -a "$GITHUB_STEP_SUMMARY"
          fi

      - name: Bundle-Size Report als Artifact hochladen
        if: hashFiles('dist/bundle-size-report.md') != ''
        uses: actions/upload-artifact@v4
        with:
          name: bundle-size-report
          path: dist/bundle-size-report.md

  fast-unit-integration:
    runs-on: ubuntu-latest
    needs: node-quality-gates
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run fast unit/integration tests
        run: npm run test:unit-integration:ci

  coverage-thresholds:
    runs-on: ubuntu-latest
    needs: fast-unit-integration
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Generate coverage report
        run: npm run test:coverage:ci

      - name: Coverage thresholds (warn mode for PRs)
        if: github.event_name == 'pull_request'
        run: npm run coverage:thresholds:warn

      - name: Coverage thresholds (blocking for main/master)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: npm run coverage:thresholds:block

  smoke-required:
    runs-on: ubuntu-latest
    needs: coverage-thresholds
    outputs:
      downgraded: ${{ steps.failure-policy.outputs.downgraded }}
      failure_count: ${{ steps.failure-policy.outputs.failure_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run critical smoke suite (required)
        id: smoke-required-run
        continue-on-error: true
        run: npm run test:e2e:smoke-required

      - name: Evaluate smoke failure policy
        id: failure-policy
        if: steps.smoke-required-run.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const workflow = context.workflow;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.ref.replace('refs/heads/', '');

            const runs = await github.paginate(
              github.rest.actions.listWorkflowRuns,
              {
                owner,
                repo,
                workflow_id: workflow,
                branch,
                status: 'completed',
                per_page: 50,
              },
              (response) => response.data.workflow_runs,
            );

            const relevant = runs
              .filter((run) => run.name === workflow)
              .filter((run) => run.id !== context.runId)
              .slice(0, 1);

            const previousFailed = relevant.length > 0 && relevant[0].conclusion === 'failure';
            const failureCount = previousFailed ? 2 : 1;
            const downgraded = previousFailed;

            core.setOutput('failure_count', String(failureCount));
            core.setOutput('downgraded', downgraded ? 'true' : 'false');

            if (downgraded) {
              const title = `[E2E] Smoke required auto-downgraded after 2 consecutive failures (${branch})`;
              const body = [
                'Die erforderliche Smoke-Suite wurde automatisch auf Übergangsmodus zurückgestuft,',
                'weil zwei aufeinanderfolgende CI-Läufe fehlgeschlagen sind.',
                '',
                `- Branch: ${branch}`,
                `- Aktueller Lauf: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
                `- Vorheriger fehlgeschlagener Lauf: ${relevant[0]?.html_url ?? 'n/a'}`,
                '',
                'Ticketpflicht: Bitte Ursachenanalyse und Stabilisierung dokumentieren, bevor die Required-Policy wieder verschärft wird.'
              ].join('\n');

              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['ci', 'e2e', 'smoke-required'],
              });
            }

      - name: Enforce required smoke gate
        if: steps.smoke-required-run.outcome == 'failure' && steps.failure-policy.outputs.downgraded != 'true'
        run: |
          echo "smoke-required fehlgeschlagen (Fehlerfolge: ${{ steps.failure-policy.outputs.failure_count || '1' }})."
          exit 1

      - name: Document auto downgrade
        if: steps.smoke-required-run.outcome == 'failure' && steps.failure-policy.outputs.downgraded == 'true'
        run: |
          echo "⚠️ smoke-required wurde nach 2 aufeinanderfolgenden Fehlschlägen automatisch zurückgestuft." | tee -a "$GITHUB_STEP_SUMMARY"
          echo "Ticket wurde automatisch erstellt (Ticketpflicht erfüllt)." | tee -a "$GITHUB_STEP_SUMMARY"

  smoke-extended:
    runs-on: ubuntu-latest
    needs: smoke-required
    if: |
      github.event_name != 'workflow_dispatch' || inputs.run_e2e_smoke == true
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run extended smoke suite (non-blocking)
        run: npm run test:e2e:smoke-extended

  e2e-smoke-nonblocking:
    runs-on: ubuntu-latest
    needs: smoke-extended
    if: |
      github.event_name != 'workflow_dispatch' || inputs.run_e2e_smoke == true
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run legacy E2E smoke checks (non-blocking transition mode)
        run: npm run test:e2e-smoke

      - name: Hinweis für spätere Umstellung auf required
        run: |
          echo "E2E-Smokes laufen aktuell non-blocking (continue-on-error). Für required: continue-on-error entfernen."
