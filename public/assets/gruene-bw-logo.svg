    <path transform="translate(150,98) rotate(163.64)" d="M -6,-37 C -14,-62 -9,-78 0,-94 C 9,-78 14,-62 6,-37 Z"/>
    <path transform="translate(150,98) rotate(180)"    d="M -6,-37 C -14,-62 -9,-78 0,-94 C 9,-78 14,-62 6,-37 Z"/>
    <path transform="translate(150,98) rotate(196.36)" d="M -6,-37 C -14,-62 -9,-78 0,-94 C 9,-78 14,-62 6,-37 Z"/>
    <path transform="translate(150,98) rotate(212.73)" d="M -6,-37 C -14,-62 -9,-78 0,-94 C 9,-78 14,-62 6,-37 Z"/>
    <path transform="translate(150,98) rotate(229.09)" d="M -6,-37 C -14,-62 -9,-78 0,-94 C 9,-78 14,-62 6,-37 Z"/>
    <path transform="translate(150,98) rotate(245.45)" d="M -6,-37 C -14,-62 -9,-78 0,-94 C 9,-78 14,-62 6,-37 Z"/>
