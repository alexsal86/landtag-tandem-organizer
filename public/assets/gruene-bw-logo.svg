    <path transform="translate(150,98) rotate(278.18)" d="M -6,-37 C -14,-62 -9,-78 0,-94 C 9,-78 14,-62 6,-37 Z"/>
    <path transform="translate(150,98) rotate(294.55)" d="M -6,-37 C -14,-62 -9,-78 0,-94 C 9,-78 14,-62 6,-37 Z"/>
    <path transform="translate(150,98) rotate(310.91)" d="M -6,-37 C -14,-62 -9,-78 0,-94 C 9,-78 14,-62 6,-37 Z"/>
    <path transform="translate(150,98) rotate(327.27)" d="M -6,-37 C -14,-62 -9,-78 0,-94 C 9,-78 14,-62 6,-37 Z"/>
    <path transform="translate(150,98) rotate(343.64)" d="M -6,-37 C -14,-62 -9,-78 0,-94 C 9,-78 14,-62 6,-37 Z"/>

    <!-- Hollow centre (white circle punched out) -->
    <circle cx="150" cy="98" r="37" fill="white"/>

    <!-- ═══ THREE LIONS (lower-left area) ═══ -->
    <!--
      Stylised BW rampant lion, facing right, height ≈ 58, width ≈ 52.
      Each repeated at a shifted position.
      Lion 1 = bottom, Lion 2 = middle (offset up-right), Lion 3 = top-right.
    -->

    <!-- Lion 1 – bottom (anchor 12, 138) -->
    <g transform="translate(12,138)">
      <!-- Tail -->
      <path d="M 10,0 C 4,-8 2,-18 8,-26 C 12,-32 8,-38 12,-42 C 16,-38 14,-32 18,-26 C 22,-18 20,-8 14,0 Z"/>
      <!-- Body -->
      <path d="M 6,0 C 2,-6 0,-14 4,-20 C 0,-26 2,-36 8,-40 C 12,-44 18,-44 22,-40 C 28,-44 36,-42 40,-36 C 46,-32 48,-24 44,-18 C 50,-14 52,-6 48,0 C 44,4 36,6 30,2 C 24,8 18,8 12,4 Z"/>
      <!-- Head -->
      <circle cx="46" cy="-22" r="14"/>
      <!-- Front leg -->
      <path d="M 42,-8 C 40,0 40,10 42,18 L 48,18 L 50,10 C 50,2 48,-6 46,-14 Z"/>
      <!-- Rear leg -->
      <path d="M 6,0 C 4,6 4,14 6,20 L 12,20 L 14,12 C 12,6 10,0 8,-4 Z"/>
    </g>

    <!-- Lion 2 – middle (shifted up and right) -->
    <g transform="translate(30,100)">
      <path d="M 10,0 C 4,-8 2,-18 8,-26 C 12,-32 8,-38 12,-42 C 16,-38 14,-32 18,-26 C 22,-18 20,-8 14,0 Z"/>
      <path d="M 6,0 C 2,-6 0,-14 4,-20 C 0,-26 2,-36 8,-40 C 12,-44 18,-44 22,-40 C 28,-44 36,-42 40,-36 C 46,-32 48,-24 44,-18 C 50,-14 52,-6 48,0 C 44,4 36,6 30,2 C 24,8 18,8 12,4 Z"/>
      <circle cx="46" cy="-22" r="14"/>
      <path d="M 42,-8 C 40,0 40,10 42,18 L 48,18 L 50,10 C 50,2 48,-6 46,-14 Z"/>
      <path d="M 6,0 C 4,6 4,14 6,20 L 12,20 L 14,12 C 12,6 10,0 8,-4 Z"/>
    </g>

    <!-- Lion 3 – top (shifted up and right again) -->
    <g transform="translate(48,62)">
      <path d="M 10,0 C 4,-8 2,-18 8,-26 C 12,-32 8,-38 12,-42 C 16,-38 14,-32 18,-26 C 22,-18 20,-8 14,0 Z"/>
      <path d="M 6,0 C 2,-6 0,-14 4,-20 C 0,-26 2,-36 8,-40 C 12,-44 18,-44 22,-40 C 28,-44 36,-42 40,-36 C 46,-32 48,-24 44,-18 C 50,-14 52,-6 48,0 C 44,4 36,6 30,2 C 24,8 18,8 12,4 Z"/>
      <circle cx="46" cy="-22" r="14"/>
      <path d="M 42,-8 C 40,0 40,10 42,18 L 48,18 L 50,10 C 50,2 48,-6 46,-14 Z"/>
      <path d="M 6,0 C 4,6 4,14 6,20 L 12,20 L 14,12 C 12,6 10,0 8,-4 Z"/>
